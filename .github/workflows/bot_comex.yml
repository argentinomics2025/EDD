name: Bot Balanza Comercial (INDEC)

on:
  schedule:
    # Se ejecuta a las 12:00 PM UTC los días 20, 21 y 22 de cada mes
    # (Lo ponemos 3 días seguidos por si el INDEC se atrasa un día en publicar)
    - cron: '0 12 20,21,22 * *'
  workflow_dispatch: # Esto te pone un botón para correrlo a mano cuando quieras

jobs:
  actualizar_comex:
    runs-on: ubuntu-latest
    steps:
      - name: Chequear código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install pandas requests supabase

      - name: Ejecutar script COMEX
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python bot_comex.py
