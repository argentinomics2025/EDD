name: 🚢⚖️ Bot Balanza Comercial (INDEC)

on:
  schedule:
    # Se ejecuta a las 12:00 PM UTC los días 20, 21 y 22 de cada mes
    - cron: '0 12 20,21,22 * *'
  workflow_dispatch: # Botón para correrlo a mano

jobs:
  actualizar_comex:
    name: Procesar Datos ICA
    runs-on: ubuntu-latest
    
    steps:
      - name: Chequear código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests supabase

      - name: Ejecutar script COMEX
        env:
          TZ: 'America/Argentina/Buenos_Aires'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/bot_comex.py
