name: 🤖 Bot ICA Rubros (Comex Detalle)

on:
  schedule:
    # Se ejecuta el día 22 de cada mes a las 10:00 AM UTC (7:00 AM Arg)
    # Le damos un par de días de changüí después del 20 por si el INDEC se demora
    - cron: '0 10 22 * *'
  workflow_dispatch: # El botón mágico para correrlo a mano

jobs:
  actualizar-rubros:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas supabase xlrd

      - name: 🚀 Ejecutar Robot de Rubros
        env:
          # Usa las mismas llaves secretas que ya tenés guardadas
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/bot_ica_rubros.py
