name: 🤖 Bot ICA Rubros (Comex Detalle)

on:
  workflow_dispatch: # EL BOTÓN MÁGICO. Solo manual, porque el script requiere actualización de URL cada mes.

jobs:
  actualizar-rubros:
    name: Procesar Excel INDEC
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas supabase xlrd

      - name: 🚀 Ejecutar Robot de Rubros
        env:
          TZ: 'America/Argentina/Buenos_Aires'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/bot_ica_rubros.py
