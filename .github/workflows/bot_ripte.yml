name: 🤖 Bot RIPTE (Salarios)

on:
  schedule:
    # Se ejecuta el día 20 de cada mes a las 10:00 AM UTC (7:00 AM Argentina)
    # El RIPTE suele salir a mediados de mes, el 20 es una fecha segura.
    - cron: '0 10 20 * *'
  workflow_dispatch: # El botón mágico para correrlo a mano desde GitHub si querés

jobs:
  actualizar-ripte:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase urllib3

      - name: 🚀 Ejecutar Robot de Salarios
        env:
          # Usamos los mismos secretos que ya tenés configurados en GitHub para los otros bots
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/bot_ripte.py
