name: 🛡️ Keepalive (Evitar Suspensión)

on:
  schedule:
    # Se ejecuta el día 1 de cada mes a las 00:00 UTC
    - cron: "0 0 1 * *"
  workflow_dispatch: # Por si alguna vez querés gatillarlo a mano

jobs:
  latido:
    name: Latido de vida al repo
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso clave para que el bot pueda escribir en el historial

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Hacer un commit vacío
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Hacemos el commit sin modificar archivos
          git commit --allow-empty -m "chore: latido mensual para evitar que GitHub pause los robots 🤖"
          
          # Empujamos el cambio al repositorio
          git push
