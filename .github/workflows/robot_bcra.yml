name: 🏦 Robot Banco Central (Datos Diarios)

on:
  workflow_dispatch: 
  
  schedule:
    # Se ejecuta todos los días a las 23:00 UTC (20:00 hora de Argentina)
    - cron: '0 23 * * *'

jobs:
  actualizar-bcra:
    name: Extraer Datos BCRA
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías
      run: |
        python -m pip install --upgrade pip
        pip install supabase requests

    - name: Ejecutar Robot del BCRA
      env:
        TZ: 'America/Argentina/Buenos_Aires' 
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python scripts/actualizar_bcra.py
