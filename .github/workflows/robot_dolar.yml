name: 💵 Robot Dólar (Tiempo Real e Historial)

on:
  workflow_dispatch: 
  
  schedule:
    # Corre cada 30 minutos, entre las 14:00 y las 21:00 UTC 
    # (Equivale a 11:00 a 18:00 hora Argentina)
    # De Lunes a Viernes (1-5)
    - cron: '*/30 14-21 * * 1-5'

jobs:
  actualizar-dolares:
    name: Extraer Cotizaciones
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías
      run: |
        python -m pip install --upgrade pip
        pip install supabase requests

    - name: Ejecutar Robot del Dólar
      env:
        TZ: 'America/Argentina/Buenos_Aires' 
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python scripts/actualizar_dolar.py
