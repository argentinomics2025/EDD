name: 🛒 Robot Inflación (INDEC/BCRA)

on:
  workflow_dispatch: 
  schedule:
    - cron: '30 20 * * *' # Corre a las 17:30 hs Argentina (20:30 UTC) todos los días

jobs:
  actualizar-inflacion:
    name: Sincronizar Inflación
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías
      run: |
        python -m pip install --upgrade pip
        pip install supabase requests urllib3

    - name: Ejecutar Robot
      env:
        TZ: 'America/Argentina/Buenos_Aires'
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python scripts/actualizar_inflacion.py
