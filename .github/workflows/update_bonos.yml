name: 📉 Robot Bonos (Mercado)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 14-20 * * 1-5' # Cada hora entre 11 y 17 hs ARG de Lunes a Viernes

jobs:
  actualizar-bonos:
    name: Scraping y Cálculo Matemático
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías
      run: |
        python -m pip install --upgrade pip
        pip install supabase selenium webdriver-manager

    - name: Ejecutar Robot
      env:
        TZ: 'America/Argentina/Buenos_Aires'
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python scripts/actualizar_bonos.py
