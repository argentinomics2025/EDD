name: 📉 Robot Bonos (Mercado)

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 14-20 * * 1-5' # Cada hora entre 11 y 17 hs ARG de Lunes a Viernes

jobs:
  actualizar-bonos:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # ESTO ES NUEVO: Instala Chrome en el servidor de GitHub
    - name: Instalar Google Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Instalar librerías
      run: |
        pip install supabase selenium webdriver-manager

    - name: Ejecutar Robot
      env:
        TZ: 'America/Argentina/Buenos_Aires'
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python scripts/actualizar_bonos.py
