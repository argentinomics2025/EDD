name: ☣️ Actualizar Historial Riesgo País

on:
  schedule:
    # Se ejecuta a las 21:00 UTC, que son las 18:00 hs en Argentina (Cierre de mercado).
    # Los días 1-5 significan de Lunes a Viernes.
    - cron: '0 21 * * 1-5'
  workflow_dispatch: 

jobs:
  update-riesgo-pais:
    name: Extraer Riesgo País
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Ejecutar Script de Riesgo País
        env:
          TZ: 'America/Argentina/Buenos_Aires'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/update_riesgo_pais.py
